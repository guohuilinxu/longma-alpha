<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙马 Longma Alpha - 智慧体</title>
    <style>
        :root { --blue: #007aff; --bg: #ffffff; --text: #111; --gray: #848e9c; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .header { background: #fff; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        
        /* 智慧体交互中心 */
        .ai-core { background: #f2f2f7; border-radius: 16px; padding: 15px; margin: 10px 0; border: 1px solid #e5e5ea; }
        .ai-status { font-size: 11px; color: var(--blue); font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .ai-bubble { background: #fff; padding: 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 20px; }
        .ai-input-area { display: flex; align-items: center; gap: 10px; margin-top: 12px; background: #fff; padding: 8px 12px; border-radius: 10px; }
        .ai-input-area input { border: none; flex: 1; outline: none; font-size: 14px; }
        
        .nav { display: flex; gap: 20px; overflow-x: auto; padding: 15px; border-bottom: 1px solid #eee; }
        .nav-item { cursor: pointer; white-space: nowrap; font-size: 14px; color: var(--gray); padding-bottom: 8px; }
        .nav-item.active { color: var(--blue); border-bottom: 2px solid var(--blue); font-weight: bold; }

        .content { padding: 0 15px; }
        .date-label { font-size: 12px; color: var(--gray); background: #eee; display: inline-block; padding: 2px 8px; border-radius: 4px; margin: 20px 0 10px 0; }
        .info-card { border-left: 2px solid var(--blue); padding-left: 15px; margin-bottom: 25px; }
        .card-box { background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 12px; font-size: 14px; }

        /* 呼吸灯动画 */
        .dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; justify-content: space-between; font-weight: bold;">
        <span>龙马 Longma Alpha</span>
        <span id="sol-price" style="color:var(--blue); font-size: 12px;">SOL $...</span>
    </div>

    <div class="ai-core">
        <div class="ai-status"><div class="dot"></div> 龙马智慧体在线</div>
        <div class="ai-bubble" id="aiResponse">你好，我是龙马。我已同步最近72小时的链上数据流，你想了解哪个标的的内幕？</div>
        <div class="ai-input-area">
            <input type="text" id="userInput" placeholder="与智慧体对话..." onkeyup="if(event.keyCode==13) aiChat()">
            <span onclick="aiVoice()" style="cursor:pointer">🎙️</span>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showAll()">社群广场</div>
    <div class="nav-item" onclick="alert('智慧体：正在筛选钱包异动...')">钱包监控</div>
    <div class="nav-item" onclick="alert('智慧体：正在计算共振指数...')">共振信号</div>
</div>

<div class="content" id="feed">
    <div class="date-label">3月17日</div>
    <div class="info-card">
        <div class="card-box"><b>AI 总结: $DSNT 深度解析</b><br>龙马抓取到项目方测试转账。筹码分布集中，主力合围迹象明显。建议关注 0.045 支撑。</div>
    </div>
</div>

<div style="position: fixed; bottom: 20px; width: 100%; text-align: center;">
    <a href="https://twitter.com/你的账号" style="background:var(--blue); color:#fff; padding:12px 30px; border-radius:25px; text-decoration:none; font-weight:bold; box-shadow: 0 4px 15px rgba(0,122,255,0.3);">关注龙马主理人</a>
</div>

<script>
    const aiResponse = document.getElementById('aiResponse');
    
    // 智慧体对话逻辑
    function aiChat() {
        const input = document.getElementById('userInput').value;
        if(!input) return;
        
        aiResponse.innerText = "龙马正在思考...";
        
        setTimeout(() => {
            if(input.toLowerCase().includes('dsnt')) {
                typeWriter("关于 $DSNT，我发现主力在 0.041 附近的吸筹动作非常明显，这跟昨天的社区情绪完全相反。建议你点击下方的 3月17日 研报深入查看。");
            } else if(input.includes('赚钱')) {
                typeWriter("在币圈，认知差就是钱。现在的机会在‘金铲子’协议的锁仓异动上，我已经把监控放在‘钱包监控’栏目了。");
            } else {
                typeWriter("正在检索全链关于‘" + input + "’的异动... 目前该标的链上表现平稳，没有发现大户撤资。建议保持观望。");
            }
            document.getElementById('userInput').value = "";
        }, 1000);
    }

    // 模拟语音
    function aiVoice() {
        typeWriter("正在聆听您的指令... 请说出你想查询的币种。");
    }

    // 打字机效果
    function typeWriter(text) {
        aiResponse.innerText = "";
        let i = 0;
        const timer = setInterval(() => {
            if (i < text.length) {
                aiResponse.innerText += text.charAt(i);
                i++;
            } else {
                clearInterval(timer);
            }
        }, 30);
    }

    async function getPrice() {
        try {
            const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=SOLUSDT');
            const d = await r.json();
            document.getElementById('sol-price').innerText = 'SOL $' + parseFloat(d.price).toFixed(2);
        } catch(e) {}
    }
    setInterval(getPrice, 5000); getPrice();
</script>
</body>
</html>
