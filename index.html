<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙马 Longma - 智慧体终端</title>
    <style>
        :root { --blue: #007aff; --green: #34c759; --bg: #ffffff; --card: #f2f2f7; --text: #111; --gray: #8e8e93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }

        /* 1. 顶层智慧体核心 (唯一入口) */
        .ai-terminal { background: #000; color: #fff; margin: 15px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .ai-display { font-size: 15px; line-height: 1.6; min-height: 80px; margin-bottom: 15px; color: #00ff00; font-family: monospace; }
        .ai-input-wrap { background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; }
        .ai-input-wrap input { border: none; background: transparent; color: #fff; flex: 1; outline: none; font-size: 14px; }

        /* 2. 复刻：功能决策仪表盘 (按键体现) */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 0 15px 20px 15px; }
        .dash-btn { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px 5px; text-align: center; transition: 0.2s; cursor: pointer; }
        .dash-btn:active { background: #f0f0f0; transform: scale(0.95); }
        .dash-icon { font-size: 18px; display: block; margin-bottom: 5px; }
        .dash-label { font-size: 11px; color: var(--text); font-weight: 600; }

        /* 3. 数字化内容流 */
        .content { padding: 0 15px; }
        .res-card { background: #fff; border-radius: 16px; border: 1px solid #eee; padding: 15px; margin-bottom: 20px; }
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .res-tag { font-size: 10px; background: var(--blue); color: #fff; padding: 2px 6px; border-radius: 4px; }
        .res-val { color: var(--green); font-weight: bold; font-size: 14px; }
        
        /* 4. 操作类按键 (卡片内部) */
        .op-row { display: flex; gap: 8px; margin-top: 15px; }
        .op-btn { flex: 1; border: 1px solid #eee; padding: 8px; border-radius: 8px; font-size: 11px; text-align: center; color: #555; background: var(--card); }

        /* 5. 营销转化按键 */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 20px 0; text-align: center; z-index: 100; }
        .btn-vip { background: #000; color: #fff; padding: 12px 30%; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="ai-terminal">
    <div class="ai-display" id="aiOutput">> LONGMA AI SYSTEM READY...<br>> 已深度链接 ChainInsight 信号库。<br>> 请下达指令或点击下方功能面板。</div>
    <div class="ai-input-wrap">
        <input type="text" id="userInput" placeholder="输入币种、逻辑或语音指令..." onkeypress="if(event.keyCode==13) chat()">
        <span onclick="chat()" style="cursor:pointer">🎙️</span>
    </div>
</div>

<div class="dashboard-grid">
    <div class="dash-btn" onclick="trigger('广场')">
        <span class="dash-icon">🔥</span>
        <span class="dash-label">金狗广场</span>
    </div>
    <div class="dash-btn" onclick="trigger('信息')">
        <span class="dash-icon">💬</span>
        <span class="dash-label">社群总结</span>
    </div>
    <div class="dash-btn" onclick="trigger('监控')">
        <span class="dash-icon">🎯</span>
        <span class="dash-label">钱包监控</span>
    </div>
    <div class="dash-btn" onclick="trigger('共振')">
        <span class="dash-icon">📡</span>
        <span class="dash-label">共振信号</span>
    </div>
</div>

<div class="content" id="feed">
    </div>

<div class="footer">
    <div style="font-size: 10px; color: var(--gray); margin-bottom: 10px;">—— 智慧体已连续运行 500+ 天 ——</div>
    <a href="https://twitter.com" class="btn-vip">关注龙马 & 订阅 VIP</a>
</div>

<script>
    const out = document.getElementById('aiOutput');
    const feed = document.getElementById('feed');

    // 模拟智慧体根据按键触发
    function trigger(type) {
        out.innerHTML = `> 正在调取【${type}】核心数据流...<br>> 正在计算共振概率...`;
        setTimeout(() => {
            if(type === '广场') {
                showData('金狗信号', '$DSNT', '+1240.5%', '监测到 12 个社群共振，主力地址持续流入。');
            } else if(type === '监控') {
                showData('钱包异动', 'KOL Kagami', '实时买入', '地址 0x71...af2 正在加仓金铲子。');
            } else {
                showData('共振分析', '全网趋势', '看涨指数 88', '多维度信号在 168 支撑位达成共识。');
            }
        }, 800);
    }

    function chat() {
        const val = document.getElementById('userInput').value;
        if(!val) return;
        out.innerHTML = `> 智慧体正在检索：${val}...<br>> 正在生成数字化推演报告...`;
        setTimeout(() => {
            showData('智慧推演', val.toUpperCase(), '胜率 82%', '基于 ChainInsight 数据，建议在该位置分批建仓。');
            document.getElementById('userInput').value = "";
        }, 1200);
    }

    function showData(tag, title, val, body) {
        const card = `
            <div class="res-card">
                <div class="res-header">
                    <span class="res-tag">${tag}</span>
                    <span class="res-val">${val}</span>
                </div>
                <div style="font-weight:bold; font-size:16px; margin-bottom:8px;">${title}</div>
                <div style="font-size:13px; color:#666; line-height:1.5;">${body}</div>
                <div class="op-row">
                    <div class="op-btn">看K线 📈</div>
                    <div class="op-btn">复刻地址 📋</div>
                    <div class="op-btn">深度研报 🔭</div>
                    <div class="op-btn">分享 📤</div>
                </div>
            </div>
        `;
        feed.innerHTML = card + feed.innerHTML;
    }

    // 初始化显示 3月17日 的一条数据
    showData('历史战绩', '昨日金狗回顾', '+886%', '龙马智慧体于 3月17日 成功捕获关键信号。');
</script>
</body>
</html>
