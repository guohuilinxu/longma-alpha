<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙马 Longma - 全自动智慧体</title>
    <style>
        :root { --blue: #007aff; --green: #34c759; --bg: #0a0a0a; --card: #1c1c1e; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; margin: 0; padding-bottom: 100px; }

        /* 1. 自动化引擎状态栏 */
        .engine-status { background: #1c1c1e; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; font-size: 11px; }
        .scanning-log { color: var(--green); font-family: monospace; height: 16px; overflow: hidden; }

        /* 2. 智慧体核心交互区 (增强科技感) */
        .ai-core { margin: 15px; background: linear-gradient(145deg, #1a1a1a, #000); border-radius: 20px; padding: 20px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,122,255,0.1); }
        .ai-display { font-size: 14px; line-height: 1.6; min-height: 60px; color: #d1d1d6; margin-bottom: 15px; }
        .ai-input { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; display: flex; gap: 10px; }
        .ai-input input { background: transparent; border: none; color: #fff; flex: 1; outline: none; }

        /* 3. 自动化仪表盘 (3大收集中心) */
        .auto-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 15px; }
        .auto-box { background: var(--card); border-radius: 12px; padding: 12px 5px; text-align: center; border: 1px solid #333; }
        .auto-num { display: block; font-size: 15px; font-weight: bold; color: var(--blue); }
        .auto-label { font-size: 10px; color: #8e8e93; }

        /* 4. 自动生成的资讯流 */
        .feed { padding: 15px; }
        .alpha-card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 15px; border: 1px solid #2c2c2e; position: relative; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tag-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .tag-auto { background: rgba(52, 199, 89, 0.1); color: var(--green); font-size: 10px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--green); }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .card-content { font-size: 13px; color: #aeaeb2; line-height: 1.5; }

        /* 操作按键体现 */
        .op-group { display: flex; gap: 8px; margin-top: 15px; }
        .op-btn { flex: 1; background: #2c2c2e; border: none; padding: 8px; border-radius: 8px; color: #fff; font-size: 11px; cursor: pointer; }

        .footer { position: fixed; bottom: 0; width: 100%; padding: 20px 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); text-align: center; }
        .btn-join { background: var(--blue); color: #fff; padding: 12px 60px; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="engine-status">
    <div class="scanning-log" id="logText">RUNNING: CHAIN_SCANNER_v6...</div>
    <div>CPU: 12% | LATENCY: 24ms</div>
</div>

<div class="ai-core">
    <div class="ai-display" id="aiMsg">龙马已开启全自动模式。我正在实时扫描 2000+ 聪明钱包与 50+ 投研频道。</div>
    <div class="ai-input">
        <input type="text" id="userInput" placeholder="输入指令，如'分析空投策略'..." onkeypress="if(event.keyCode==13) chat()">
        <span onclick="chat()" style="cursor:pointer">🚀</span>
    </div>
</div>

<div class="auto-grid">
    <div class="auto-box">
        <span class="auto-num" id="addrCount">2,142</span>
        <span class="auto-label">追踪钱包</span>
    </div>
    <div class="auto-box">
        <span class="auto-num" id="infoCount">842</span>
        <span class="auto-label">今日资讯</span>
    </div>
    <div class="auto-box">
        <span class="auto-num">12</span>
        <span class="auto-label">空投策略</span>
    </div>
</div>

<div class="feed" id="mainFeed">
    </div>

<div class="footer">
    <a href="#" class="btn-join">升级龙马 VIP 自运行版</a>
</div>

<script>
    const logs = [
        "FETCHING WALLET: 0x71a...bf2",
        "ANALYZING TWITTER SENTIMENT...",
        "NEW AIRDROP DETECTED: BERACHAIN",
        "SYNCING SMART MONEY FLOW...",
        "DECODING SMART CONTRACTS..."
    ];
    
    // 1. 模拟自动化日志
    setInterval(() => {
        document.getElementById('logText').innerText = logs[Math.floor(Math.random()*logs.length)];
        // 随机增加数据量
        document.getElementById('addrCount').innerText = (parseInt(document.getElementById('addrCount').innerText.replace(',','')) + Math.floor(Math.random()*2)).toLocaleString();
    }, 2000);

    // 2. 智慧体自动逻辑
    function chat() {
        const val = document.getElementById('userInput').value;
        const msg = document.getElementById('aiMsg');
        msg.innerText = "正在针对‘" + val + "’调取全自动化数据库...";
        
        setTimeout(() => {
            if(val.includes('空投')) {
                addCard('空投策略', 'Berachain 交互优化', '当前优先级：极高', '龙马已自动收集最新 5 个测试网任务，点击研报即可查看自动化脚本流程。');
            } else {
                addCard('自动发现', val.toUpperCase(), '信任分: 92%', '根据自收集模型，该标的在最近 1 小时内社交热度激增 300%。');
            }
            msg.innerText = "报告已生成，已同步至下方瀑布流。";
            document.getElementById('userInput').value = "";
        }, 1200);
    }

    function addCard(tag, title, status, content) {
        const feed = document.getElementById('mainFeed');
        const card = `
            <div class="alpha-card">
                <div class="tag-row">
                    <span class="tag-auto">龙马自收集</span>
                    <span style="font-size:10px; color:var(--blue)">${status}</span>
                </div>
                <div class="card-title">🤖 ${title}</div>
                <div class="card-content">${content}</div>
                <div class="op-group">
                    <button class="op-btn">查看路径</button>
                    <button class="op-btn">一键跟进</button>
                    <button class="op-btn">深度研报</button>
                </div>
            </div>
        `;
        feed.innerHTML = card + feed.innerHTML;
    }

    // 初始化一条自发现内容
    addCard('聪明钱', '$Pnut 巨鲸异动', '监测到地址归集', '龙马自动识别出 3 个顶级聪明钱包在 0.12 附近完成 50 万美金建仓。');
</script>
</body>
</html>
