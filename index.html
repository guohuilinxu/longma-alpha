<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙马 Longma | 智慧看板</title>
    <style>
        :root { --blue: #007aff; --green: #34c759; --red: #ff3b30; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* 顶部状态 */
        .status-bar { background: #000; color: var(--green); padding: 12px 18px; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 2000; }
        
        /* 看板专用容器 */
        #marketBoard { display: none; padding: 15px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 行情大盘卡片 */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .ticker-card { background: #fff; border-radius: 20px; padding: 15px; border: 1px solid #e5e5ea; cursor: pointer; transition: 0.2s; }
        .ticker-card:active { transform: scale(0.95); }
        .ticker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ticker-name { font-weight: 800; font-size: 16px; }
        .ticker-price { font-size: 18px; font-weight: 700; font-family: monospace; }
        .ticker-change { font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .up { color: var(--green); background: rgba(52,199,89,0.1); }
        .down { color: var(--red); background: rgba(255,59,48,0.1); }

        /* 详情模态框 */
        #detailModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 3000; overflow-y: auto; }
        .modal-nav { padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; }
        .close-btn { font-size: 24px; margin-right: 15px; cursor: pointer; }

        /* 核心导航切换 */
        .tab-nav { display: flex; margin: 15px; background: #e5e5ea; border-radius: 12px; padding: 2px; }
        .tab-item { flex: 1; text-align: center; padding: 8px; font-size: 13px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        .tab-item.active { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 其他原有样式... (此处精简，保持 v18.0 的风格) */
        .ai-center { background: #1c1c1e; color: #fff; margin: 15px; border-radius: 24px; padding: 20px; }
        .card { background: #fff; border-radius: 24px; padding: 20px; margin: 0 15px 15px; border: 1px solid #e5e5ea; }
        .footer { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); padding: 20px 0; text-align: center; border-top: 1px solid #e5e5ea; z-index: 1000; }
        .btn-main { background: #000; color: #fff; padding: 12px 30%; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="status-bar">
    <div>CORE: ONLINE | 24H MONITOR</div>
    <div id="clock">00:00:00</div>
</div>

<div class="tab-nav">
    <div class="tab-item active" onclick="switchTab('intel')">智能情报</div>
    <div class="tab-item" onclick="switchTab('board')">数据看板</div>
</div>

<div id="intelPage">
    <div class="ai-center">
        <div style="font-size: 13px; margin-bottom:15px; border-left:3px solid var(--blue); padding-left:10px;">龙马今日策略：主流币持仓不动，关注 Meme 板块超跌反弹机会。</div>
        <div style="background:rgba(255,255,255,0.1); border-radius:12px; display:flex; padding:10px;">
            <input type="text" id="uInput" placeholder="输入 CA 或关键词..." style="background:none; border:none; color:#fff; flex:1; outline:none;">
            <span onclick="alert('后台检索中...')">🚀</span>
        </div>
    </div>
    <div id="mainStream"></div>
</div>

<div id="marketBoard">
    <h3 style="margin-top:0">主流价值资产</h3>
    <div class="market-grid" id="mainMarket">
        </div>
    
    <h3>热门异动资产 (SOL系)</h3>
    <div class="market-grid" id="hotMarket">
        </div>
</div>

<div id="detailModal">
    <div class="modal-nav">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <b id="modalTitle">资产详情</b>
    </div>
    <div id="chartContainer" style="width:100%; height:500px;">
        </div>
</div>

<div class="footer"><a href="https://twitter.com" class="btn-main">关注主理人</a></div>

<script>
    // 1. 切换页面逻辑
    function switchTab(tab) {
        document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        if(tab === 'board') {
            document.getElementById('intelPage').style.display = 'none';
            document.getElementById('marketBoard').style.display = 'block';
            renderBoard();
        } else {
            document.getElementById('intelPage').style.display = 'block';
            document.getElementById('marketBoard').style.display = 'none';
        }
    }

    // 2. 看板数据渲染 (数据来源于你之前的 data_tokens.json 或 实时 API)
    const mainAssets = [
        { s: 'SOL', p: '242.1', c: '+5.2%', ca: 'So11111111111111111111111111111111111111112' },
        { s: 'BTC', p: '96,432', c: '+1.8%', ca: '3NZ9J7... (Wrap)' },
        { s: 'ETH', p: '2,654', c: '-0.4%', ca: '7vfC7... (Wrap)' },
        { s: 'JUP', p: '1.12', c: '+12.4%', ca: 'JUPyiwrYJFv1mHvxHjaC3Acd6mxG8E2uvWhC6F6L' }
    ];

    function renderBoard() {
        const grid = document.getElementById('mainMarket');
        grid.innerHTML = "";
        mainAssets.forEach(a => {
            const card = document.createElement('div');
            card.className = 'ticker-card';
            card.onclick = () => openDetail(a.s, a.ca);
            const isUp = a.c.startsWith('+');
            card.innerHTML = `
                <div class="ticker-header">
                    <span class="ticker-name">${a.s}</span>
                    <span class="ticker-change ${isUp?'up':'down'}">${a.c}</span>
                </div>
                <div class="ticker-price">$${a.p}</div>
                <div style="font-size:9px; color:#aaa; margin-top:8px;">实时链上汇率</div>
            `;
            grid.appendChild(card);
        });
        
        // 热门币可以从你的 data_tokens.json 里读取
        document.getElementById('hotMarket').innerHTML = `<p style="font-size:12px; color:#666;">正在连接龙马全节点，实时同步 Meme 热榜...</p>`;
    }

    // 3. 详情与图表系统
    function openDetail(symbol, ca) {
        document.getElementById('modalTitle').innerText = symbol + " / SOL 实时看板";
        document.getElementById('detailModal').style.display = 'block';
        
        // 核心：嵌入 DexScreener 的图表，这是内地最稳定看行情的方式
        const chartUrl = `https://dexscreener.com/solana/${ca}?embed=1&theme=light&trades=0&info=0`;
        document.getElementById('chartContainer').innerHTML = `
            <iframe src="${chartUrl}" style="width:100%; height:100%; border:none;"></iframe>
        `;
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
        document.getElementById('chartContainer').innerHTML = "";
    }

    // 基础时钟
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    // 初始化显示内容
    function addIntelCard(title, body) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<b>${title}</b><p style="font-size:13px; color:#666;">${body}</p>`;
        document.getElementById('mainStream').appendChild(div);
    }
    
    window.onload = () => {
        addIntelCard('🔥 热门异动', '监测到 PNUT 地址大额成交，龙马建议关注 $2.0 支撑位。');
        addIntelCard('🪂 空投提醒', 'Berachain 积分同步已完成，请在“空投策略”中检查资格。');
    };
</script>
</body>
</html>
