<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙马 Longma - 自动化智慧终端</title>
    <style>
        :root { --blue: #007aff; --green: #30d158; --bg: #ffffff; --card: #f2f2f7; --text: #1c1c1e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        
        /* 1. 顶部：全自动扫描日志 */
        .system-monitor { background: #000; color: var(--green); padding: 10px 15px; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--blue); }
        
        /* 2. 智慧体核心大脑 (交互入口) */
        .ai-brain { background: #1c1c1e; color: #fff; margin: 15px; border-radius: 24px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .brain-display { font-size: 15px; line-height: 1.6; min-height: 80px; margin-bottom: 15px; color: #f0f0f0; border-left: 3px solid var(--blue); padding-left: 15px; }
        .input-group { background: rgba(255,255,255,0.1); border-radius: 12px; display: flex; padding: 12px; }
        .input-group input { border: none; background: transparent; color: #fff; flex: 1; outline: none; }

        /* 3. 10个功能按键的显性体现 (复刻你的原始需求) */
        .nav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 0 15px 15px; }
        .nav-btn { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px 5px; text-align: center; cursor: pointer; }
        .nav-btn span { display: block; font-size: 18px; margin-bottom: 4px; }
        .nav-btn b { font-size: 10px; color: #111; display: block; }

        /* 4. 自动化收集的内容流 (3天跨度) */
        .stream { padding: 0 15px; }
        .data-card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; }
        .card-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--gray); margin-bottom: 10px; }
        
        /* 操作类按键 (卡片内) */
        .op-row { display: flex; gap: 8px; margin-top: 15px; }
        .op-btn { flex: 1; border: 1px solid #eee; padding: 8px; border-radius: 8px; font-size: 11px; text-align: center; background: var(--card); }

        /* 营销与转化 (2个按钮) */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid #eee; padding: 15px 0; text-align: center; z-index: 100; }
        .btn-vip { background: #000; color: #fff; padding: 12px 25%; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="system-monitor">
    <div id="log">SCANNING: 聪明钱地址库...</div>
    <div id="clock">2026-03-17 12:00:00</div>
</div>

<div class="ai-brain">
    <div class="brain-display" id="aiOutput">你好，我是龙马。我正在自动采集全网资讯、追踪聪明钱包并优化空投策略。</div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="输入关键词，让我自动优化逻辑..." onkeypress="if(event.keyCode==13) autoOptimize()">
        <span onclick="autoOptimize()" style="cursor:pointer">🚀</span>
    </div>
</div>

<div class="nav-grid">
    <div class="nav-btn" onclick="autoAction('广场')"><span>🔥</span><b>金狗广场</b></div>
    <div class="nav-btn" onclick="autoAction('总结')"><span>💬</span><b>资讯总结</b></div>
    <div class="nav-btn" onclick="autoAction('监控')"><span>🎯</span><b>钱包监控</b></div>
    <div class="nav-btn" onclick="autoAction('共振')"><span>📡</span><b>共振信号</b></div>
</div>

<div style="margin:0 15px 15px; background:#fff9db; padding:10px; border-radius:12px; font-size:11px; display:flex; justify-content:space-between; align-items:center;">
    <span>💎 订阅 VIP，解锁全自动空投脚本策略</span>
    <button style="background:#000; color:#fff; border:none; padding:5px 10px; border-radius:6px; font-size:10px;" onclick="location.href='https://twitter.com'">解锁权限</button>
</div>

<div class="stream" id="mainStream">
    </div>

<div class="footer">
    <a href="https://twitter.com" class="btn-vip">关注龙马主理人</a>
</div>

<script>
    const output = document.getElementById('aiOutput');
    const stream = document.getElementById('mainStream');

    // 1. 自动优化逻辑
    function autoOptimize() {
        const val = document.getElementById('userInput').value;
        output.innerHTML = `> 正在根据关键词 "${val}" 自动优化采集策略...<br>> 已重新分配 40% 的计算节点追踪该领域资讯与地址。`;
        setTimeout(() => {
            addCard('自动优化', val.toUpperCase(), '已将该领域加入 24h 自动化监控，并同步了最近 3 天的相关数据。');
            document.getElementById('userInput').value = "";
        }, 1200);
    }

    // 2. 实装导航功能
    function autoAction(type) {
        output.innerHTML = `> 正在实时抓取最新的【${type}】数据...<br>> 已过滤 90% 的垃圾信息。`;
        setTimeout(() => {
            if(type==='广场') addCard('金狗广场', '$LONGMA', '龙马自动化系统在链上发现一个潜伏期金狗，聪明钱占比 45%。');
            if(type==='监控') addCard('钱包监控', '0x71...af2', '该地址今日自动买入 3 笔新资产，胜率评估：极高。');
            if(type==='共振') addCard('共振信号', 'AI + Meme', '推特讨论热度与链上净流入达成共振，建议关注。');
            if(type==='总结') addCard('资讯总结', '今日全网脱水', '自动收集了 50 个频道的精华：重点关注 Berachain 空投截止日期。');
        }, 800);
    }

    function addCard(tag, title, body) {
        const card = `
            <div class="data-card">
                <div class="card-meta"><span style="color:var(--blue)">[${tag}]</span><span>2026-03-17</span></div>
                <div style="font-weight:bold; font-size:16px; margin-bottom:10px;">${title}</div>
                <div style="font-size:13px; color:#666; line-height:1.5;">${body}</div>
                <div class="op-row">
                    <div class="op-btn" onclick="alert('看K线')">看K线 📈</div>
                    <div class="op-btn" onclick="alert('复制')">复制地址 📋</div>
                    <div class="op-btn" onclick="alert('研报')">深度研报 🔭</div>
                    <div class="op-btn" onclick="alert('分享')">分享 📤</div>
                </div>
            </div>`;
        stream.innerHTML = card + stream.innerHTML;
    }

    // 自动模拟日志滚动
    setInterval(() => {
        const logs = ["SCANNING: TX_MEMPOOL...", "COLLECTING: TWITTER_DATA...", "OPTIMIZING: AIRDROP_PATH..."];
        document.getElementById('log').innerText = logs[Math.floor(Math.random()*logs.length)];
        document.getElementById('clock').innerText = new Date().toLocaleString();
    }, 2000);

    // 初始化内容
    addCard('空投策略', 'Berachain 自动化脚本', '系统已自动收集并优化了最新的空投路径，点击“深度研报”查看。');
</script>
</body>
</html>
<script>
    // 定义一个真实的合约地址（这里用 $LONGMA 模拟，你可以换成变量）
    const MOCK_ADDR = "6p6W5qSbeUTuXvYS93v2YQu6T63H5F1zT2y2y2y2y2y"; // 模拟地址

    function addCard(tag, title, body) {
        // 为了演示，我们给每个卡片分配一个模拟地址
        const tokenAddr = MOCK_ADDR; 
        
        const card = `
            <div class="data-card">
                <div class="card-meta"><span style="color:var(--blue)">[${tag}]</span><span>2026-03-17</span></div>
                <div style="font-weight:bold; font-size:18px; margin-bottom:10px;">${title}</div>
                <div style="font-size:13px; color:#666; line-height:1.5;">${body}</div>
                
                <div class="op-row">
                    <div class="op-btn" onclick="window.open('https://dexscreener.com/solana/${tokenAddr}')">看K线 📈</div>
                    
                    <div class="op-btn" onclick="copyToClipboard('${tokenAddr}', this)">复制地址 📋</div>
                    
                    <div class="op-btn" onclick="window.open('https://twitter.com/search?q=${title}')">深度研报 🔭</div>
                    
                    <div class="op-btn" onclick="shareContent('${title}', '${body}')">分享 📤</div>
                </div>
            </div>`;
        document.getElementById('mainStream').innerHTML = card + document.getElementById('mainStream').innerHTML;
    }

    // 实装复制功能
    function copyToClipboard(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerHTML;
            btn.innerHTML = "已复制 ✅";
            btn.style.color = "var(--green)";
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.color = "";
            }, 2000);
        });
    }

    // 实装分享功能
    function shareContent(title, text) {
        if (navigator.share) {
            navigator.share({
                title: '龙马 AI 情报: ' + title,
                text: text,
                url: window.location.href,
            });
        } else {
            alert('当前浏览器不支持原生分享，请手动复制链接');
        }
    }
</script>
