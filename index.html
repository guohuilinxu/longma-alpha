<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙马 Longma Alpha - 智能投研</title>
    <style>
        :root { --blue: #007aff; --bg: #ffffff; --card: #f9f9f9; --text: #111; --gray: #848e9c; --border: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        .header { background: #fff; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        
        /* 搜索框升级 */
        .ai-search-bar { background: #f2f2f7; border-radius: 12px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; margin-top: 10px; border: 1px solid transparent; transition: 0.3s; }
        .ai-search-bar:focus-within { border-color: var(--blue); background: #fff; box-shadow: 0 0 8px rgba(0,122,255,0.1); }
        .ai-search-bar input { border: none; background: transparent; flex: 1; outline: none; font-size: 14px; }
        
        .nav { display: flex; gap: 20px; overflow-x: auto; padding: 15px; border-bottom: 1px solid var(--border); }
        .nav-item { cursor: pointer; white-space: nowrap; font-size: 14px; color: var(--gray); position: relative; padding-bottom: 8px; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        .nav-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--blue); }

        .content { padding: 0 15px; }
        .date-label { font-size: 12px; color: var(--gray); background: #eee; display: inline-block; padding: 2px 8px; border-radius: 4px; margin: 20px 0 10px 0; }
        .info-card { border-left: 2px solid var(--blue); padding-left: 15px; margin-bottom: 25px; transition: 0.3s; }
        .card-title { color: var(--blue); font-weight: 700; margin-bottom: 8px; font-size: 15px; }
        .card-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        
        /* 加载动画 */
        #ai-loading { display: none; text-align: center; padding: 20px; color: var(--blue); font-size: 13px; font-weight: bold; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); padding: 15px 0; text-align: center; }
        .btn-main { background: var(--blue); color: #fff; padding: 12px 25%; border-radius: 30px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; justify-content: space-between; font-weight: bold;">
        <span>龙马 Longma Alpha 🤖</span>
        <span id="sol-price" style="color:var(--blue)">SOL $...</span>
    </div>
    <div class="ai-search-bar">
        <span>🔍</span>
        <input type="text" id="aiInput" placeholder="搜币种、钱包地址或提问..." onkeyup="if(event.keyCode==13) doSmartSearch()">
        <span onclick="startVoice()" style="cursor:pointer">🎙️</span>
    </div>
</div>

<div class="nav" id="mainNav">
    <div class="nav-item active" onclick="render('all')">综合广场</div>
    <div class="nav-item" onclick="render('info')">社群信息</div>
    <div class="nav-item" onclick="render('wallet')">钱包监控</div>
    <div class="nav-item" onclick="render('signal')">共振信号</div>
</div>

<div id="ai-loading">龙马 AI 正在扫描全链数据...</div>

<div class="content" id="feed"></div>

<div class="footer">
    <a href="https://twitter.com/你的账号" class="btn-main">关注主理人</a>
</div>

<script>
    const alphaData = [
        { date: '3月17日', time: '11:04', type: 'info', title: 'AI 总结: $DSNT 深度解析', body: '项目方测试转账，筹码高度集中。建议关注 0.045 支撑。', keys: 'DSNT' },
        { date: '3月17日', time: '09:15', type: 'wallet', title: 'KOL 异动: Kagami 加仓', body: '地址 0x71...af2 买入 4.75M $金铲子。胜率 88%。', keys: 'KAGAMI,金铲子' },
        { date: '3月16日', time: '22:15', type: 'info', title: '社群热议: $Derp 真实性', body: 'CA地址存疑，情绪谨慎。龙马建议避开。', keys: 'DERP' },
        { date: '3月16日', time: '14:30', type: 'signal', title: '共振触发: $SOL 信号', body: '三周期共振强度达 92%。资金回暖。', keys: 'SOL' }
    ];

    function render(filter = 'all', searchKey = '') {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        let lastDate = '';

        let filtered = alphaData.filter(i => {
            const matchType = (filter === 'all' || i.type === filter);
            const matchSearch = i.keys.toLowerCase().includes(searchKey.toLowerCase()) || i.title.includes(searchKey);
            return matchType && matchSearch;
        });

        if (filtered.length === 0 && searchKey !== '') {
            feed.innerHTML = `<div class="info-card"><div class="card-title">龙马 AI 实时简评</div><div class="card-box">关于“${searchKey}”，龙马暂未在近3日库中发现内幕异动。但从大盘来看，该标的目前处于震荡区间，建议关注小时线放量。</div></div>`;
            return;
        }

        filtered.forEach(i => {
            if(i.date !== lastDate) {
                feed.innerHTML += `<div class="date-label">${i.date}</div>`;
                lastDate = i.date;
            }
            feed.innerHTML += `<div class="info-card"><div class="card-title">${i.title}</div><div class="card-box">${i.body}</div></div>`;
        });
    }

    function doSmartSearch() {
        const val = document.getElementById('aiInput').value;
        const loader = document.getElementById('ai-loading');
        loader.style.display = 'block';
        document.getElementById('feed').innerHTML = '';
        
        setTimeout(() => {
            loader.style.display = 'none';
            render('all', val);
        }, 800);
    }

    function startVoice() {
        const input = document.getElementById('aiInput');
        input.placeholder = "正在聆听语音...";
        setTimeout(() => { 
            input.value = "SOL"; 
            doSmartSearch();
            input.placeholder = "搜币种、钱包地址或提问...";
        }, 1500);
    }

    render();
</script>
</body>
</html>
