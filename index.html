<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙马 Longma - 全维度智慧体</title>
    <style>
        :root { --blue: #007aff; --bg: #ffffff; --card: #f8f9fa; --text: #111; --gray: #8e8e93; --border: #eee; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        
        /* 1. 顶部状态 */
        .header { background: #fff; padding: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .live-status { color: var(--blue); font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .dot { width: 6px; height: 6px; background: var(--blue); border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* 2. 智慧体核心交互 (黑金质感) */
        .ai-brain { background: #000; color: #fff; margin: 15px; border-radius: 20px; padding: 20px; box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        .brain-text { font-family: 'PingFang SC', sans-serif; font-size: 15px; line-height: 1.6; min-height: 70px; margin-bottom: 15px; color: #f0f0f0; }
        .ai-input-wrap { background: rgba(255,255,255,0.15); border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; }
        .ai-input-wrap input { border: none; background: transparent; color: #fff; flex: 1; outline: none; font-size: 14px; }
        .ai-input-wrap input::placeholder { color: #888; }

        /* 3. 导航类 (4个按钮) */
        .nav { display: flex; gap: 20px; overflow-x: auto; padding: 10px 15px; border-bottom: 1px solid var(--border); background: #fff; scrollbar-width: none; }
        .nav-item { cursor: pointer; white-space: nowrap; font-size: 14px; color: var(--gray); padding-bottom: 8px; }
        .nav-item.active { color: var(--blue); border-bottom: 2px solid var(--blue); font-weight: bold; }

        /* 4. 营销权限 (2个按钮) */
        .banner { background: #fff9db; border: 1px solid #ffe066; margin: 15px; padding: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
        .btn-vip { background: #111; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* 5. 资讯流 (3天跨度) */
        .content { padding: 0 15px; }
        .date-label { font-size: 12px; color: var(--gray); background: #f2f2f7; display: inline-block; padding: 2px 8px; border-radius: 4px; margin: 20px 0 10px 0; }
        .info-card { border-left: 2px solid var(--blue); padding-left: 15px; margin-bottom: 30px; }
        .card-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; }

        /* 6. 操作按钮 (4个按钮) */
        .op-group { display: flex; gap: 8px; margin-top: 12px; }
        .op-btn { background: #fff; border: 1px solid #ddd; padding: 6px 12px; border-radius: 6px; font-size: 12px; color: #555; text-decoration: none; cursor: pointer; }

        /* 底部按钮 */
        .footer { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); padding: 15px 0; text-align: center; }
        .btn-main { background: var(--blue); color: #fff; padding: 12px 25%; border-radius: 30px; text-decoration: none; font-weight: bold; font-size: 15px; display: inline-block; }
    </style>
</head>
<body>

<div class="header">
    <div class="top-bar">
        <b style="font-size: 20px;">龙马 Longma</b>
        <div class="live-status"><div class="dot"></div> 智慧体全维度运行中</div>
    </div>
</div>

<div class="ai-brain">
    <div class="brain-text" id="aiOutput">你好，我是智慧体龙马。我不止于金融。商业、人生、决策、甚至此时此刻你内心的困惑，都可以告诉我。</div>
    <div class="ai-input-wrap">
        <input type="text" id="aiInput" placeholder="输入任何你想探讨的话题..." onkeypress="if(event.keyCode==13) askAi()">
        <span onclick="aiVoice()" style="cursor:pointer; margin-left: 10px;">🎙️</span>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="render('all')">全维广场</div>
    <div class="nav-item" onclick="render('logic')">深度逻辑</div>
    <div class="nav-item" onclick="render('trend')">趋势监控</div>
    <div class="nav-item" onclick="render('life')">智慧人生</div>
</div>

<div class="banner">
    <span>💡 开启深度对话，获取龙马独家智慧研报</span>
    <button class="btn-vip" onclick="location.href='https://twitter.com/你的账号'">订阅 VIP</button>
</div>

<div class="content" id="feed">
    </div>

<div class="footer">
    <a href="https://twitter.com/你的账号" class="btn-main">关注主理人</a>
</div>

<script>
    const data = [
        { date: '3月17日', time: '11:00', type: 'logic', title: '商业逻辑：破除信息差', body: '智慧体提示：未来的竞争不再是获取信息，而是过滤信息。你需要构建自己的“信息漏斗”。' },
        { date: '3月16日', time: '22:30', type: 'life', title: '人生智慧：低谷期的复利', body: '龙马分析：人生的波动与 K 线无异。在支撑位（低谷）时的积累，决定了突破压力位后的高度。' },
        { date: '3月15日', time: '09:00', type: 'trend', title: '全球趋势：AI 时代的生存', body: '跨领域思考将成为最稀缺的资源。智慧体正在监控 12 个核心领域的指数共振。' }
    ];

    function askAi() {
        const val = document.getElementById('aiInput').value;
        const out = document.getElementById('aiOutput');
        out.innerHTML = "正在跨维度检索“" + val + "”的相关逻辑...";
        
        setTimeout(() => {
            if(val.includes('钱') || val.includes('商业')) {
                typeWriter("龙马建议：金钱只是价值交换的副产品。关注你能为这个世界解决什么痛点，钱自然会流向你。", out);
            } else if(val.includes('难过') || val.includes('累')) {
                typeWriter("智慧体感应到了你的情绪。记住，所有的压力都是因为你在进化。现在的疲惫，是灵魂在重塑支撑位。", out);
            } else {
                typeWriter("关于“" + val + "”，我建议你跳出当下的点，从更大的周期去俯瞰。你需要的是一次认知上的“缩放”。", out);
            }
        }, 800);
    }

    function typeWriter(text, element) {
        element.innerHTML = "";
        let i = 0;
        const timer = setInterval(() => {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
            } else { clearInterval(timer); }
        }, 30);
    }

    function render(f = 'all') {
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        let lastDate = '';
        data.filter(i => f==='all' || i.type===f).forEach(i => {
            if(i.date !== lastDate) {
                feed.innerHTML += `<div class="date-label">${i.date}</div>`;
                lastDate = i.date;
            }
            feed.innerHTML += `<div class="info-card"><div class="card-box"><b>${i.title}</b><br>${i.body}</div><div class="op-group"><div class="op-btn">看深度报告</div><div class="op-btn">复制观点</div><div class="op-btn">智慧分析</div><div class="op-btn">分享</div></div></div>`;
        });
    }

    function aiVoice() {
        document.getElementById('aiInput').placeholder = "智慧体正在倾听你的声音...";
        setTimeout(() => { document.getElementById('aiInput').placeholder = "输入任何你想探讨的话题..."; }, 2000);
    }

    render();
</script>
</body>
</html>
